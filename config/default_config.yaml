# Obsidian CLI Configuration
obsidian:
  vault_path: "/Users/ammare/Library/Mobile Documents/iCloud~md~obsidian/Documents/Life goals"  # Path to Obsidian vault directory
  cli_path: null  # Optional: Path to Obsidian CLI binary (auto-detects if null)
  timeout: 30  # Command timeout in seconds

# Claude API Configuration
claude:
  api_key_env: "ANTHROPIC_API_KEY"  # Environment variable name
  model: "claude-sonnet-4-5-20250929"
  max_tokens: 4000
  temperature: 0.7

# Scanning Configuration
scanning:
  recent_timeframe: 7  # days (1 week)
  check_interval: 30  # seconds (30 seconds for cron)

# Rate Limiting
rate_limit:
  max_requests_per_hour: 5

# Response Configuration
response:
  max_length: 5000  # characters
  include_timestamp: true
  note_suffix: "_response_"

# Logging Configuration
logging:
  level: "DEBUG"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/agent.log"
  max_size: 10485760  # 10MB
  backup_count: 5

# Image Processing Configuration
image_processing:
  enabled: true  # Enable/disable image OCR extraction
  supported_formats: [jpg, jpeg, png, gif, webp]
  max_file_size_mb: 10  # Maximum image file size in MB
  attachment_folders: ["_attachments", "assets", "images"]  # Folders to search for images

  # OCR extraction settings (Phase 1)
  ocr_extraction:
    enabled: true  # If false, skip OCR extraction entirely
    prompt: "Extract all text from this image. Preserve the original formatting, structure, and layout as much as possible. If the image contains handwritten text, transcribe it carefully. If there is no text in the image, respond with 'No text found'."
    max_images_per_request: 5  # Maximum images to process per request

  # Rate limiting for image OCR
  count_ocr_toward_rate_limit: true  # Each image OCR counts as API request

# Dry Run Mode
dry_run: false  # If true, show what would be done without executing
